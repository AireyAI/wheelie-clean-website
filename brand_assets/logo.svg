<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Eye shape top arc -->
  <path d="M10 46 Q70 8 140 46 Q210 84 270 46" stroke="#c97fa0" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Eye shape bottom arc (lighter) -->
  <path d="M10 46 Q70 84 140 46 Q210 8 270 46" stroke="#c97fa0" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Iris circle -->
  <circle cx="140" cy="46" r="13" stroke="#c97fa0" stroke-width="1.4" fill="none"/>
  <!-- Pupil -->
  <circle cx="140" cy="46" r="5" fill="#c97fa0"/>

  <!-- Lash lines (top) -->
  <line x1="60"  y1="22" x2="55"  y2="8"  stroke="#2d1423" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="88"  y1="12" x2="86"  y2="0"  stroke="#2d1423" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="116" y1="8"  x2="116" y2="0"  stroke="#2d1423" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="140" y1="7"  x2="140" y2="0"  stroke="#2d1423" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="164" y1="8"  x2="165" y2="0"  stroke="#2d1423" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="192" y1="12" x2="194" y2="0"  stroke="#2d1423" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="220" y1="22" x2="225" y2="8"  stroke="#2d1423" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Wordmark: Dolled by Louise -->
  <text
    x="140"
    y="90"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="22"
    font-style="italic"
    font-weight="300"
    letter-spacing="3"
    fill="#2d1423"
  >Dolled by Louise</text>
</svg>
